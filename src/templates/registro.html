<!DOCTYPE html>
<html>
<head>
    <title>Registrar Perrito</title>
</head>
<body>

<h2>Registrar Perrito </h2>

<form action="/perritos" method="post">

    <input type="number" name="id" placeholder="ID"><br><br>

    <input type="text" name="nombre" placeholder="Nombre"><br><br>

    <input type="text" name="tamano" placeholder="Tamaño"><br><br>

    <input type="text" name="sexo" placeholder="Sexo"><br><br>

    <input type="number" name="edad" placeholder="Edad"><br><br>

    <input type="text" name="raza" placeholder="Raza"><br><br>

    <input type="text" name="ubicacion" placeholder="Ubicación"><br><br>

    <input type="text" name="contacto" placeholder="Contacto"><br><br>

    <label>Vacunado:</label>
    <input type="checkbox" name="adoptado"><br><br>

    <button type="submit">Registrar</button>

</form>

</body>
</html>
