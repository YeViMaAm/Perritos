
<!DOCTYPE html>
<html>
<head>
    <title>Perritos en adopción</title>
    /static/styles.css
</head>
<body>

<header>
    <h1>Perritos disponibles</h1>
</header>

<div class="container">

    <p>Explora los perritos disponibles para adopción</p>

    <div class="cards">
        {% for p in perritos %}
        <div class="card">
            <h3>{{ p.nombre }}</h3>
            <p>{{ p.raza }} • {{ p.edad }}</p>
            <p class="estado {{ p.estado|lower }}">{{ p.estado }}</p>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
