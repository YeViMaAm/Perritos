<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Candy - Registrar Perrito</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --green: #2e7d32;
    --green-light: #66bb6a;
    --brown: #5d4037;
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #263238;
    --gray: #90a4ae;
}

/* GENERAL */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HEADER (IGUAL A LISTA) */
header {
    background: var(--green);
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h2 {
    margin: 0;
    font-size: 18px;
}

/* BOTÓN CERRAR SESIÓN (IGUAL LISTA) */
.logout {
    background: var(--brown);
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

/* CONTENEDOR PRINCIPAL */
.wrapper {
    display: flex;
    justify-content: center;
    padding: 50px 20px;
    gap: 40px;
    flex-wrap: wrap;
}

/* IMAGEN LATERAL */
.side-image {
    width: 320px;
    height: 520px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.side-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* FORM */
.form-box {
    background: var(--card);
    width: 650px;
    padding: 35px;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

/* TITULOS */
.title {
    font-size: 24px;
    color: var(--green);
    margin-bottom: 5px;
}

.subtitle {
    color: var(--gray);
    font-size: 14px;
    margin-bottom: 25px;
}

/* SECCIONES */
.section-title {
    margin-top: 25px;
    margin-bottom: 10px;
    font-weight: bold;
    color: var(--brown);
}

/* INPUTS */
label {
    display: block;
    margin-top: 12px;
    font-size: 14px;
    font-weight: 600;
}

input, select {
    width: 100%;
    padding: 11px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #ddd;
    transition: 0.2s;
}

input:focus, select:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(46,125,50,0.15);
    outline: none;
}

/* DOS COLUMNAS */
.two-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

/* AYUDA */
.helper {
    font-size: 12px;
    color: var(--gray);
}

/* BOTÓN PRINCIPAL */
button {
    margin-top: 28px;
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--green), var(--green-light));
    border: none;
    color: white;
    font-size: 15px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-2px);
}

/* FOOTER (MISMO ESTILO LISTA) */
footer {
    margin-top: 60px;
    background: linear-gradient(135deg, #3e2723, #5d4037);
    color: white;
    padding: 40px;
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .side-image {
        display: none;
    }

    .form-box {
        width: 100%;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
    <h2>🐶 Candy - Registro de Perritos</h2>
    <button class="logout">Cerrar sesión</button>
</header>

<!-- CONTENIDO -->
<div class="wrapper">

    <!-- IMAGEN DECORATIVA -->
    <div class="side-image">
        <img src="https://images.unsplash.com/photo-1558788353-f76d92427f16">
    </div>

    <!-- FORM -->
    <div class="form-box">

        <div class="title">Registrar Perrito</div>
        <div class="subtitle">Completa la información para publicar en adopción 🐾</div>

        <form action="/perritos" method="post">

            <div class="section-title">Datos del perrito</div>

            <label>Nombre</label>
            <input type="text" name="nombre" required>

            <div class="two-columns">
                <div>
                    <label>Tamaño</label>
                    <select name="tamano">
                        <option>Pequeño</option>
                        <option>Mediano</option>
                        <option>Grande</option>
                    </select>
                </div>

                <div>
                    <label>Sexo</label>
                    <select name="sexo">
                        <option>Macho</option>
                        <option>Hembra</option>
                    </select>
                </div>
            </div>

            <label>Edad</label>
            <input type="number" name="edad">

            <label>Raza</label>
            <input type="text" name="raza">

            <div class="section-title">Ubicación y contacto</div>

            <label>Ubicación (IMPORTANTE)</label>
            <input type="text" name="ubicacion">

            <label>Contacto</label>
            <input type="text" name="contacto">
            <div class="helper">Teléfono o WhatsApp</div>

            <div class="section-title">Estado</div>

            <div class="two-columns">
                <div>
                    <label>Vacunado</label>
                    <select name="vacunado">
                        <option value="true">Sí</option>
                        <option value="false">No</option>
                    </select>
                </div>

                <div>
                    <label>Estado</label>
                    <select name="estado">
                        <option>Pendiente</option>
                        <option>En proceso</option>
                        <option>Adoptado</option>
                    </select>
                </div>
            </div>

            <div class="section-title">Fotografía</div>

            <label>URL imagen</label>
            <input type="text" name="foto">

            <button type="submit">Guardar registro</button>

        </form>

    </div>

</div>

<!-- FOOTER IGUAL LISTA -->
<footer>
    <div>
        <h3>🐶 Candy</h3>
        <p>Adoptar es cambiar una vida ❤️</p>
    </div>

    <div>
        <p>Facebook</p>
        <p>Instagram</p>
        <p>WhatsApp</p>
    </div>

    <div>
        <p>Privacidad</p>
        <p>Términos</p>
        <p>Datos</p>
    </div>
</footer>

</body>
</html>
