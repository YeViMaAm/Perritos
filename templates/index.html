<!DOCTYPE html>
<html>
<head>
    <title>Iniciar sesión - Candy</title>
    <style>
        /* MANTENEMOS TODO TU CSS EXACTAMENTE IGUAL */
        :root { --primary: #2E7D32; --primary-light: #66BB6A; --brown: #6D4C41; --accent: #FFB74D; --background: #F5F5F5; --card: #FFFFFF; --text: #263238; --gray: #90A4AE; }
        body { margin: 0; font-family: Arial, Helvetica, sans-serif; height: 100vh; display: flex; }
        .left { flex: 0.9; background-image: linear-gradient(135deg, rgba(46,125,50,0.75), rgba(109,76,65,0.75)), url("https://i.pinimg.com/originals/de/53/5e/de535e1c735bdf5fb46f3623d019056d.jpg"); background-size: cover; background-position: 65% center; position: relative; }
        .overlay { position: absolute; bottom: 60px; left: 40px; color: white; max-width: 320px; }
        .right { flex: 1.1; background: linear-gradient(to bottom right, #f5f5f5, #e8f5e9); display: flex; justify-content: center; align-items: center; flex-direction: column; overflow-y: auto; padding: 20px; }
        .login-box { background: var(--card); padding: 30px 45px; border-radius: 12px; box-shadow: 0 6px 18px rgba(109,76,65,0.15); width: 360px; margin-bottom: 20px; }
        .login-box h2 { margin-bottom: 5px; color: var(--primary); }
        label { font-weight: bold; font-size: 14px; color: var(--brown); }
        input { width: 100%; padding: 10px; margin-top: 6px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .error { color: red; font-size: 13px; margin-top: 10px; text-align: center; }
        .success { color: green; font-size: 13px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
<div class="left">
    <div class="overlay">
        <h1>Encuentra tu mejor amigo 🐾</h1>
        <p>Adoptar es salvar una vida</p>
    </div>
</div>
<div class="right">
    <!-- BLOQUE LOGIN -->
    <div class="login-box">
        <h2>Iniciar sesión</h2>
        <p style="font-size: 14px; color: var(--brown);">Accede para ayudar a un perrito</p>
        <form action="/login" method="post">
            <label>Usuario</label>
            <input type="text" name="usuario" required>
            <label>Contraseña</label>
            <input type="password" name="contrasena" required>
            <button type="submit">Ingresar</button>
        </form>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        {% if msg %}<p class="success">{{ msg }}</p>{% endif %}
    </div>

    <!-- BLOQUE REGISTRO (Punto 3 del docente: Unicidad de usuario) -->
    <div class="login-box" style="padding: 20px 45px;">
        <h3 style="color: var(--brown); margin: 0;">¿Eres nuevo?</h3>
        <p style="font-size: 12px; margin-bottom: 10px;">Crea tu cuenta aquí</p>
        <form action="/registro_usuario" method="post">
            <input type="text" name="nombre" placeholder="Nombre completo" required>
            <input type="text" name="usuario" placeholder="Crea un usuario" required>
            <input type="password" name="contrasena" placeholder="Contraseña" required>
            <button type="submit" style="background: var(--brown); padding: 8px;">Registrarme</button>
        </form>
    </div>
</div>
</body>
</html>
