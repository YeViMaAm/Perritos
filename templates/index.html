
<!DOCTYPE html>
<html>
<head>
    <title>Iniciar sesión</title>

    <style>
        :root {
            --primary: #2E7D32;
            --primary-light: #66BB6A;
            --accent: #FFB74D;

            --background: #F5F5F5;
            --card: #FFFFFF;
            --text: #263238;
            --gray: #90A4AE;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            height: 100vh;
            display: flex;
        }

        /* LADO IZQUIERDO (IMAGEN) */
        .left {
            flex: 1;
            background-image: url("https://images.unsplash.com/photo-1517849845537-4d257902454a");
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .overlay {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: white;
            max-width: 300px;
        }

        .overlay h1 {
            margin: 0;
            font-size: 28px;
        }

        .overlay p {
            font-size: 14px;
        }

        /* LADO DERECHO (FORM) */
        .right {
            flex: 1;
            background: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: var(--card);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            width: 320px;
        }

        .login-box h2 {
            margin-bottom: 5px;
            color: var(--primary);
        }

        .login-box p {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(46,125,50,0.15);
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            color: white;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .error {
            margin-top: 10px;
            color: red;
            font-size: 13px;
        }

        /* RESPONSIVE (MUY PRO 🔥) */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .left {
                height: 200px;
            }

            .overlay {
                bottom: 10px;
                left: 20px;
            }
        }
    </style>
</head>

<body>

<!-- IMAGEN -->
<div class="left">
    <div class="overlay">
        <h1>Encuentra tu mejor amigo 🐾</h1>
        <p>Adoptar es salvar una vida</p>
    </div>
</div>

<!-- FORM -->
<div class="right">

    <div class="login-box">
        <h2>Iniciar sesión</h2>
        <p>Accede para adoptar o registrar un perrito</p>

        <form action="/login" method="post">

            <label>Usuario</label>
            <input type="text" name="usuario" required>

            <label>Contraseña</label>
            <input type="password" name="contrasena" required>

            <button type="submit">Ingresar</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

    </div>

</div>

</body>
</html>
