<!DOCTYPE html>
<html>
<head>
    <title>Iniciar sesión</title>

    <style>
        :root {
            --primary: #2E7D32;
            --primary-light: #66BB6A;
            --brown: #6D4C41;
            --accent: #FFB74D;

            --background: #F5F5F5;
            --card: #FFFFFF;
            --text: #263238;
            --gray: #90A4AE;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            height: 100vh;
            display: flex;
        }

        /* IMAGEN CON OVERLAY VERDE + CAFÉ */
        .left {
            flex: 0.9;
            background-image: 
                linear-gradient(135deg, rgba(46,125,50,0.75), rgba(109,76,65,0.75)),
                url("https://i.pinimg.com/originals/de/53/5e/de535e1c735bdf5fb46f3623d019056d.jpg");
            background-size: cover;
            background-position: 65% center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* TEXTO SOBRE IMAGEN */
        .overlay {
            position: absolute;
            bottom: 60px;
            left: 40px;
            color: white;
            max-width: 320px;
        }

        .overlay h1 {
            margin: 0;
            font-size: 32px;
            font-weight: bold;
            line-height: 1.2;
        }

        .overlay p {
            font-size: 15px;
            opacity: 0.9;
            margin-top: 8px;
        }

        /* FORM */
        .right {
            flex: 1.1;
            background: linear-gradient(to bottom right, #f5f5f5, #e8f5e9);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: var(--card);
            padding: 45px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(109,76,65,0.15);
            width: 360px;
        }

        .login-box h2 {
            margin-bottom: 5px;
            color: var(--primary);
        }

        .login-box p {
            font-size: 14px;
            color: var(--brown);
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
            color: var(--brown);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(46,125,50,0.15);
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            color: white;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transform: translateY(-1px);
        }

        .error {
            margin-top: 10px;
            color: red;
            font-size: 13px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .left {
                height: 220px;
                background-position: center;
            }

            .overlay {
                bottom: 15px;
                left: 20px;
            }
        }
    </style>
</head>

<body>

<!-- IMAGEN -->
<div class="left">
    <div class="overlay">
        <h1>Encuentra tu mejor amigo 🐾</h1>
        <p>Adoptar es salvar una vida</p>
    </div>
</div>

<!-- LOGIN -->
<div class="right">

    <div class="login-box">
        <h2>Iniciar sesión</h2>
        <p>Accede para adoptar o registrar un perrito</p>

        <form action="/login" method="post">

            <label>Usuario</label>
            <input type="text" name="usuario" required>

            <label>Contraseña</label>
            <input type="password" name="contrasena" required>

            <button type="submit">Ingresar</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

    </div>

</div>

</body>
</html>
