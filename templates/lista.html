<!DOCTYPE html>
<html>
<head>
    <title>Lista de Perritos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Perritos Registrados</h1>
</header>

<div class="container">

    <div class="cards">
        {% for p in perritos %}
        <div class="card">
            <h3>{{ p.nombre }}</h3>
            <p>{{ p.raza }} - {{ p.edad }} años</p>
            <p>{{ "Vacunado" if p.vacunado else "No vacunado" }}</p>
        </div>
        {% endfor %}
    </div>

    <a href="/registro">Registrar otro perrito</a>

</div>

</body>
</html>
